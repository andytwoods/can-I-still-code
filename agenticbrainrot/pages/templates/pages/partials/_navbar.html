<nav class="navbar" role="navigation" aria-label="main navigation">
  <div class="navbar-brand">
    <a class="navbar-item" href="{% url 'home' %}">
      <strong>AgenticBrainrot</strong>
    </a>
    <a role="button"
       class="navbar-burger"
       aria-label="menu"
       aria-expanded="false"
       data-target="navbarMain">
      <span aria-hidden="true"></span>
      <span aria-hidden="true"></span>
      <span aria-hidden="true"></span>
      <span aria-hidden="true"></span>
    </a>
  </div>
  <div id="navbarMain" class="navbar-menu">
    <div class="navbar-start">
      {% if request.user.is_staff %}
        <div class="navbar-item has-dropdown is-hoverable">
          <a class="navbar-link">Admin Preview</a>
          <div class="navbar-dropdown">
            <a class="navbar-item" href="{% url 'challenges:preview_challenge' %}">Code Editor</a>
            <a class="navbar-item" href="{% url 'coding_sessions:mock_session_start' %}">Mock Session</a>
            <a class="navbar-item" href="{% url 'admin:index' %}">Django Admin</a>
          </div>
        </div>
      {% endif %}
    </div>
    <div class="navbar-end">
      <div class="navbar-item">
        <button id="theme-switcher"
                class=""
                type="button"
                title="Switch to dark mode"
                aria-label="Switch to dark mode"
                aria-pressed="false">
          <span class="icon">
            <i class="fas fa-moon" aria-hidden="true"></i>
          </span>
        </button>
      </div>
      {% if request.user.is_authenticated %}
        <a class="navbar-item"
           href="{% url 'dashboard:personal_results' %}">My Results</a>
        <a class="navbar-item"
           href="{% url 'accounts:detail' request.user.pk %}">My Profile</a>
        <div class="navbar-item">
          <a class="button is-light" href="{% url 'account_logout' %}">Sign Out</a>
        </div>
      {% else %}
        {% if ACCOUNT_ALLOW_REGISTRATION %}
          <div class="navbar-item">
            <a id="sign-up-link" class="button is-primary" href="{% url 'account_signup' %}">Sign Up</a>
          </div>

        <div class="navbar-item">

        </div>
