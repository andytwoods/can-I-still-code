<nav class="navbar" role="navigation" aria-label="main navigation">
  <div class="navbar-brand">
    <a class="navbar-item" href="{% url 'home' %}">
      <strong>Can I Still Code?</strong>
    </a>
    <button class="navbar-item a11y-open-btn is-hidden-desktop"
            type="button"
            aria-controls="a11yPanel"
            aria-expanded="false"
            aria-label="Open accessibility settings">
      <span class="icon">
        <i class="fas fa-universal-access" aria-hidden="true"></i>
      </span>
    </button>
    <a role="button"
       class="navbar-burger"
       aria-label="menu"
       aria-expanded="false"
       data-target="navbarMain">
      <span aria-hidden="true"></span>
      <span aria-hidden="true"></span>
      <span aria-hidden="true"></span>
      <span aria-hidden="true"></span>
    </a>
  </div>
  <div id="navbarMain" class="navbar-menu">
    <div class="navbar-end">
      {% if request.user.is_authenticated %}
        <a class="navbar-item" href="{% url 'dashboard:personal_results' %}">My Results</a>
        <a class="navbar-item"
           href="{% url 'accounts:detail' request.user.pk %}">My Profile</a>
        <div class="navbar-item">
          <a class="button is-light" href="{% url 'account_logout' %}">Sign Out</a>
        </div>
      {% else %}
        {% if ACCOUNT_ALLOW_REGISTRATION %}
          <div class="navbar-item">
            <a id="sign-up-link"
               class="button is-primary"
               href="{% url 'account_signup' %}">Sign Up</a>
          </div>
        {% endif %}
        <div class="navbar-item">
          <a id="log-in-link"
             class="button is-light"
             href="{% url 'account_login' %}">Sign In</a>
        </div>
      {% endif %}
      <button class="navbar-item a11y-open-btn is-hidden-touch"
              type="button"
              aria-controls="a11yPanel"
              aria-expanded="false"
              aria-label="Open accessibility settings">
        <span class="icon">
          <i class="fas fa-universal-access" aria-hidden="true"></i>
        </span>
        <span>Accessibility</span>
      </button>
    </div>
  </div>
</nav>
