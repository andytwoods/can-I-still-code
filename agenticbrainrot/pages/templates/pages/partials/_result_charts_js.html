{# Chart.js initialisation. Requires Chart.js + chartjs-adapter-date-fns already loaded. #}
{# Requires accuracy_data, speed_data, runs_data, chart_colours in context.              #}
{# Optional: complexity_data, loc_data for extra metric charts.                          #}
<script>
  (function () {
    {# djlint:off #}
    var accuracyData   = {{ accuracy_data|safe }};
    var speedData      = {{ speed_data|safe }};
    var runsData       = {{ runs_data|safe }};
    var complexityData   = {{ complexity_data|default:"null"|safe }};
    var locData          = {{ loc_data|default:"null"|safe }};
    var efficiencyData   = {{ efficiency_data|default:"null"|safe }};
    var colours        = {{ chart_colours|safe }};
    {# djlint:on #}

    var accValues = accuracyData.map(function(d) { return d.y; });
    var spdValues = speedData.map(function(d)    { return d.y; });
    var runValues = runsData.map(function(d)      { return d.y; });

    var isDark    = document.documentElement.getAttribute("data-theme") === "dark";
    var textColor = isDark ? "#e0e0e0" : "#363636";
    var gridColor = isDark ? "rgba(255,255,255,0.1)" : "rgba(0,0,0,0.1)";

    var sessionAxis = {
      type: "linear",
      ticks: {
        color: textColor,
        stepSize: 1,
        callback: function(v) { return Number.isInteger(v) ? "S" + v : ""; }
      },
      grid: { color: gridColor }
    };

    function makeChart(id, data, colour, colourBg, yMax) {
      var opts = {
        responsive: true,
        scales: {
          y: { beginAtZero: true, ticks: { color: textColor }, grid: { color: gridColor } },
          x: sessionAxis
        },
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              title: function(items) {
                var pt = data[items[0].dataIndex];
                return pt && pt.date ? pt.date : "Session " + items[0].parsed.x;
              }
            }
          }
        }
      };
      if (yMax !== undefined) { opts.scales.y.max = yMax; }
      new Chart(document.getElementById(id), {
        type: "line",
        data: {
          datasets: [{
            data: data,
            borderColor: colour,
            backgroundColor: colourBg,
            fill: true,
            tension: 0.3,
            pointStyle: "line",
            pointRadius: 6,
            rotation: 90
          }]
        },
        options: opts
      });
    }

    makeChart("accuracy-chart", accuracyData, colours.accuracy, colours.accuracy_bg, 100);
    makeChart("speed-chart",    speedData,    colours.speed,    colours.speed_bg);
    makeChart("runs-chart",     runsData,     colours.runs,     colours.runs_bg);
    if (complexityData) {
      makeChart("complexity-chart", complexityData, colours.complexity, colours.complexity_bg);
    }
    if (locData) {
      makeChart("loc-chart", locData, colours.loc, colours.loc_bg);
    }
    if (efficiencyData) {
      makeChart("efficiency-chart", efficiencyData, colours.efficiency, colours.efficiency_bg);
    }

    function setSummary(id, values, unit) {
      var el = document.getElementById(id);
      if (!el || !values.length) return;
      var mn  = Math.min.apply(null, values).toFixed(1);
      var mx  = Math.max.apply(null, values).toFixed(1);
      var txt = "Range: " + mn + unit + " \u2013 " + mx + unit;
      if (values.length > 1) {
        var diff = (values[values.length - 1] - values[0]).toFixed(1);
        txt += "  \u00b7  " + (diff >= 0 ? "+" : "") + diff + unit + " overall";
      }
      el.textContent = txt;
    }

    setSummary("accuracy-summary",   accValues, "%");
    setSummary("speed-summary",      spdValues, "s");
    setSummary("runs-summary",       runValues, "");
    if (complexityData) {
      setSummary("complexity-summary", complexityData.map(function(d) { return d.y; }), "");
    }
    if (locData) {
      setSummary("loc-summary", locData.map(function(d) { return d.y; }), " lines");
    }
    if (efficiencyData) {
      setSummary("efficiency-summary", efficiencyData.map(function(d) { return d.y; }), "x");
    }
  })();
</script>
