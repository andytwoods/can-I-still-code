{% load crispy_forms_filters %}

<div class="box">
  <h3 class="title is-5">Post-Session Survey</h3>
  <p class="mb-4">Almost done! Please answer a few questions about this session.</p>

  <form hx-post="{% url 'coding_sessions:session_view' session.pk %}"
        hx-target="#session-container"
        hx-swap="innerHTML">
    {% csrf_token %}
    <input type="hidden" name="action" value="submit_post_session">

    {{ form|crispy }}

    <div class="field mt-4">
      <div class="control">
        <button type="submit" class="button is-primary">
          Complete Session
        </button>
      </div>
    </div>
  </form>
</div>
