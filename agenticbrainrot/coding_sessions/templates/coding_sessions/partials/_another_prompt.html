<div class="box has-text-centered">
  <h3 class="title is-5">Nice work!</h3>
  <p class="mb-4">
    You've completed {{ challenges_done }} of {{ total_challenges }} challenges. If time permits we would very much appreicate it if you could complete all {{ total_challenges }} challenges.
  </p>
  <div class="buttons is-centered">
    <button class="button is-primary is-medium"
            hx-post="{% url 'coding_sessions:session_view' session.pk %}"
            hx-target="#session-container"
            hx-swap="innerHTML"
            hx-vals='{"action": "another"}'>
      Another challenge
    </button>
    <button class="button is-light is-medium"
            hx-post="{% url 'coding_sessions:session_view' session.pk %}"
            hx-target="#session-container"
            hx-swap="innerHTML"
            hx-vals='{"action": "done"}'>
      I'm done for today
    </button>
  </div>
</div>
