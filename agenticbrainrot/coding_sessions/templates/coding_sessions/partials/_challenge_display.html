<div class="box">
  <h2 class="title is-4">{{ challenge.title }}</h2>
  <div class="content">
    {{ challenge.description|linebreaksbr }}
  </div>
</div>

<div id="code-editor" data-skeleton="{{ challenge.skeleton_code }}"></div>

<div class="buttons mt-3">
  <button id="run-btn" class="button is-info" type="button" disabled>
    Run Code
  </button>
  <button id="submit-btn" class="button is-primary" type="button" disabled>
    Submit
  </button>
  <button id="skip-btn" class="button is-light"
          type="button"
          hx-post="{% url 'coding_sessions:session_view' session.pk %}"
          hx-target="#session-container"
          hx-vals='{"action": "skip"}'>
    Skip
  </button>
</div>

<div id="output" class="box mt-3" style="min-height: 50px; max-height: 200px; overflow-y: auto; font-family: monospace; font-size: 0.85em;">
</div>

<div id="test-results" class="mt-3"></div>

<!-- Hidden form for HTMX submission -->
<form id="challenge-form"
      hx-post="{% url 'coding_sessions:session_view' session.pk %}"
      hx-target="#session-container"
      hx-swap="innerHTML"
      style="display: none;">
  {% csrf_token %}
  <input type="hidden" name="action" value="submit">
  <input type="hidden" id="attempt-uuid" name="attempt_uuid" value="{{ attempt_uuid }}">
  <input type="hidden" id="submitted-code" name="submitted_code" value="">
  <input type="hidden" id="tests-passed" name="tests_passed" value="">
  <input type="hidden" id="tests-total" name="tests_total" value="">
  <input type="hidden" id="time-taken" name="time_taken_seconds" value="">
  <input type="hidden" id="active-time" name="active_time_seconds" value="">
  <input type="hidden" id="idle-time" name="idle_time_seconds" value="">
  <input type="hidden" id="paste-count-input" name="paste_count" value="0">
  <input type="hidden" id="paste-total-chars-input" name="paste_total_chars" value="0">
  <input type="hidden" id="keystroke-count-input" name="keystroke_count" value="0">
  <input type="hidden" id="tab-blur-count-input" name="tab_blur_count" value="0">
</form>
