{% extends "base.html" %}

{% load static %}

{% block title %}User: {{ object.name }}{% endblock title %}

{% block content %}
  <div class="columns">
    <div class="column is-12">
      <h2 class="title">{{ object.name }}</h2>
    </div>
  </div>
  {% if object == request.user %}
    <div class="buttons">
      <a class="button is-primary" href="{% url 'accounts:update' %}">My Info</a>
      <a class="button is-primary" href="{% url 'account_email' %}">E-Mail</a>
      <a class="button is-primary" href="{% url 'mfa_index' %}">MFA</a>
    </div>
  {% endif %}
{% endblock content %}
